name: Deploy JufipAI Website

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [new_article]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log webhook trigger
        if: github.event_name == 'repository_dispatch'
        env:
          ARTICLE_ID: ${{ github.event.client_payload.article_id }}
          TRIGGERED_AT: ${{ github.event.client_payload.triggered_at }}
        run: |
          echo "Triggered by LinkedIn Poster webhook"
          echo "Article ID: $ARTICLE_ID"
          echo "Triggered at: $TRIGGERED_AT"

      - name: Install, build, and upload
        uses: withastro/action@v5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
